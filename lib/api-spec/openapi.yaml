components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CountResponse:
      type: object
      properties:
        count:
          type: integer
      required:
        - count

    # Auth
    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        nome:
          type: string
        role:
          type: string
          enum: [Admin, Coordenador, Secretaria, Retencao]
      required:
        - id
        - email
        - nome
        - role

    # Aluno
    Aluno:
      type: object
      properties:
        id:
          type: integer
        nomeCompleto:
          type: string
        cpf:
          type: string
        matricula:
          type: string
        curso:
          type: string
        turno:
          type: string
          enum: [Matutino, Vespertino, Noturno]
        status:
          type: string
          enum: [Ativo, Retido, Trancado, Egresso]
        valorMensalidade:
          type: number
        financiador:
          type: string
        createdAt:
          type: string
      required:
        - id
        - nomeCompleto
        - cpf
        - matricula
        - curso
        - turno
        - status
        - valorMensalidade
        - financiador
        - createdAt

    AlunoDetalhado:
      type: object
      properties:
        id:
          type: integer
        nomeCompleto:
          type: string
        cpf:
          type: string
        matricula:
          type: string
        curso:
          type: string
        turno:
          type: string
          enum: [Matutino, Vespertino, Noturno]
        status:
          type: string
          enum: [Ativo, Retido, Trancado, Egresso]
        valorMensalidade:
          type: number
        financiador:
          type: string
        createdAt:
          type: string
        frequencias:
          type: array
          items:
            $ref: "#/components/schemas/FrequenciaResumo"
        documentos:
          type: array
          items:
            $ref: "#/components/schemas/Documento"
        emRetencao:
          type: boolean
      required:
        - id
        - nomeCompleto
        - cpf
        - matricula
        - curso
        - turno
        - status
        - valorMensalidade
        - financiador
        - createdAt
        - frequencias
        - documentos
        - emRetencao

    CreateAlunoBody:
      type: object
      properties:
        nomeCompleto:
          type: string
        cpf:
          type: string
        matricula:
          type: string
        curso:
          type: string
        turno:
          type: string
          enum: [Matutino, Vespertino, Noturno]
        status:
          type: string
          enum: [Ativo, Retido, Trancado, Egresso]
        valorMensalidade:
          type: number
        financiador:
          type: string
      required:
        - nomeCompleto
        - cpf
        - matricula
        - curso
        - turno

    UpdateAlunoBody:
      type: object
      properties:
        nomeCompleto:
          type: string
        cpf:
          type: string
        matricula:
          type: string
        curso:
          type: string
        turno:
          type: string
          enum: [Matutino, Vespertino, Noturno]
        status:
          type: string
          enum: [Ativo, Retido, Trancado, Egresso]
        valorMensalidade:
          type: number
        financiador:
          type: string

    ImportAlunosBody:
      type: object
      properties:
        alunos:
          type: array
          items:
            $ref: "#/components/schemas/CreateAlunoBody"
      required:
        - alunos

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
        - imported
        - errors

    # Turma
    Turma:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        curso:
          type: string
        periodo:
          type: string
        dataInicio:
          type: string
        dataFim:
          type: string
      required:
        - id
        - nome
        - curso
        - periodo
        - dataInicio
        - dataFim

    TurmaDetalhada:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        curso:
          type: string
        periodo:
          type: string
        dataInicio:
          type: string
        dataFim:
          type: string
        totalAlunos:
          type: integer
      required:
        - id
        - nome
        - curso
        - periodo
        - dataInicio
        - dataFim
        - totalAlunos

    CreateTurmaBody:
      type: object
      properties:
        nome:
          type: string
        curso:
          type: string
        periodo:
          type: string
        dataInicio:
          type: string
        dataFim:
          type: string
      required:
        - nome
        - curso
        - periodo
        - dataInicio
        - dataFim

    UpdateTurmaBody:
      type: object
      properties:
        nome:
          type: string
        curso:
          type: string
        periodo:
          type: string
        dataInicio:
          type: string
        dataFim:
          type: string

    Matricula:
      type: object
      properties:
        id:
          type: integer
        turmaId:
          type: integer
        alunoId:
          type: integer
      required:
        - id
        - turmaId
        - alunoId

    MatricularAlunoBody:
      type: object
      properties:
        alunoId:
          type: integer
      required:
        - alunoId

    # Chamada (Attendance)
    Chamada:
      type: object
      properties:
        id:
          type: integer
        turmaId:
          type: integer
        alunoId:
          type: integer
        data:
          type: string
        presente:
          type: boolean
        justificada:
          type: boolean
        tipoJustificativa:
          type: ["string", "null"]
        observacao:
          type: ["string", "null"]
        alunoNome:
          type: ["string", "null"]
      required:
        - id
        - turmaId
        - alunoId
        - data
        - presente
        - justificada

    SaveChamadaBody:
      type: object
      properties:
        turmaId:
          type: integer
        data:
          type: string
        registros:
          type: array
          items:
            $ref: "#/components/schemas/ChamadaRegistro"
      required:
        - turmaId
        - data
        - registros

    ChamadaRegistro:
      type: object
      properties:
        alunoId:
          type: integer
        presente:
          type: boolean
        justificada:
          type: boolean
        tipoJustificativa:
          type: ["string", "null"]
        observacao:
          type: ["string", "null"]
      required:
        - alunoId
        - presente
        - justificada

    SaveChamadaResponse:
      type: object
      properties:
        saved:
          type: integer
        retencaoFlagged:
          type: integer
      required:
        - saved
        - retencaoFlagged

    FrequenciaResumo:
      type: object
      properties:
        turmaId:
          type: integer
        turmaNome:
          type: string
        periodo:
          type: string
        totalAulas:
          type: integer
        presencas:
          type: integer
        faltas:
          type: integer
        faltasJustificadas:
          type: integer
        percentualFaltas:
          type: number
        emRetencao:
          type: boolean
      required:
        - turmaId
        - turmaNome
        - periodo
        - totalAulas
        - presencas
        - faltas
        - faltasJustificadas
        - percentualFaltas
        - emRetencao

    # Retencao
    Retencao:
      type: object
      properties:
        id:
          type: integer
        alunoId:
          type: integer
        turmaId:
          type: integer
        percentualFaltas:
          type: number
        dataNotificacao:
          type: ["string", "null"]
        status:
          type: string
          enum:
            - Identificado
            - Encaminhado
            - Em_Contato
            - Aguardando_Resposta
            - Retorno_Confirmado
            - Cancelamento_Solicitado
            - Formulario_Preenchido
            - Aguardando_Assinatura
            - Assinado
            - Enviado_CRM
            - Removido_BAP
            - HBS_Notificado
            - Encerrado
            - Reintegrado
        observacaoSecretaria:
          type: ["string", "null"]
        responsavel:
          type: string
        motivoCancelamento:
          type: ["string", "null"]
        dataDecisaoAluno:
          type: ["string", "null"]
        nomeCoordinadora:
          type: ["string", "null"]
        dataAssinatura:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - alunoId
        - turmaId
        - percentualFaltas
        - status
        - responsavel
        - createdAt

    RetencaoDetalhada:
      type: object
      properties:
        id:
          type: integer
        alunoId:
          type: integer
        turmaId:
          type: integer
        percentualFaltas:
          type: number
        dataNotificacao:
          type: ["string", "null"]
        status:
          type: string
          enum:
            - Identificado
            - Encaminhado
            - Em_Contato
            - Aguardando_Resposta
            - Retorno_Confirmado
            - Cancelamento_Solicitado
            - Formulario_Preenchido
            - Aguardando_Assinatura
            - Assinado
            - Enviado_CRM
            - Removido_BAP
            - HBS_Notificado
            - Encerrado
            - Reintegrado
        observacaoSecretaria:
          type: ["string", "null"]
        responsavel:
          type: string
        createdAt:
          type: string
        alunoNome:
          type: string
        alunoCurso:
          type: string
        alunoMatricula:
          type: string
        periodo:
          type: string
      required:
        - id
        - alunoId
        - turmaId
        - percentualFaltas
        - status
        - responsavel
        - createdAt
        - alunoNome
        - alunoCurso
        - alunoMatricula
        - periodo

    RetencaoDetalhadaCompleta:
      type: object
      properties:
        id:
          type: integer
        alunoId:
          type: integer
        turmaId:
          type: integer
        percentualFaltas:
          type: number
        dataNotificacao:
          type: ["string", "null"]
        status:
          type: string
        observacaoSecretaria:
          type: ["string", "null"]
        responsavel:
          type: string
        motivoCancelamento:
          type: ["string", "null"]
        dataDecisaoAluno:
          type: ["string", "null"]
        nomeCoordinadora:
          type: ["string", "null"]
        dataAssinatura:
          type: ["string", "null"]
        createdAt:
          type: string
        alunoNome:
          type: string
        alunoCurso:
          type: string
        alunoMatricula:
          type: string
        alunoValorMensalidade:
          type: number
        periodo:
          type: string
        disciplinas:
          type: array
          items:
            type: object
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/RetencaoAuditLog"
      required:
        - id
        - alunoId
        - turmaId
        - percentualFaltas
        - status
        - responsavel
        - createdAt
        - alunoNome
        - alunoCurso
        - alunoMatricula
        - alunoValorMensalidade
        - periodo
        - disciplinas
        - timeline

    UpdateRetencaoBody:
      type: object
      properties:
        status:
          type: string
        observacaoSecretaria:
          type: string

    AcaoRetencaoBody:
      type: object
      properties:
        acao:
          type: string
          enum:
            - encaminhar
            - registrar_contato
            - aguardar_resposta
            - retorno_confirmado
            - cancelamento_solicitado
            - preencher_formulario
            - encaminhar_assinatura
            - assinar
            - retirar_crm
            - remover_bap
            - notificar_hbs
            - encerrar
            - reintegrar
        observacao:
          type: ["string", "null"]
        motivoCancelamento:
          type: ["string", "null"]
        nomeCoordinadora:
          type: ["string", "null"]
      required:
        - acao

